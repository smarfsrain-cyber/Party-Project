<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Xác nhận tham dự — Event Party</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c9a96e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#d4af7a;--secondary:#f0d9a0;--bg:#0b0c10;--surface:#13141a;--border:rgba(255,255,255,0.09);--text:#f0eee8;--muted:#7a7a8a}
body{min-height:100vh;font-family:'Inter',sans-serif;color:var(--text);font-size:15px;line-height:1.5;background:#0e0b08}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px}
/* themes */
body.t-wedding{background:linear-gradient(160deg,#0e0b08,#1a1510,#0e0a06);--primary:#d4af7a;--secondary:#f0d9a0}
body.t-thoi_noi{background:linear-gradient(160deg,#060e0c,#0e1a17,#060e0a);--primary:#5cb8a0;--secondary:#7dd8c0}
body.t-day_thang{background:linear-gradient(160deg,#0e080b,#1a1015,#0e0809);--primary:#d98fa0;--secondary:#f0b0c0}
body.t-dam_gio{background:linear-gradient(160deg,#090a0c,#131520,#0a0b0e);--primary:#a0a8b8;--secondary:#c0cad8}
body.t-birthday{background:linear-gradient(160deg,#08060e,#100d1a,#080610);--primary:#9b7fe8;--secondary:#c0a0ff}
/* loading */
#screen-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.dots{display:flex;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--primary);animation:pulse 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
/* screens */
#screen-error,#screen-form{display:none;width:100%;max-width:500px}
#screen-error{text-align:center;padding:60px 20px}
.err-em{font-size:52px;margin-bottom:16px}
.err-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:8px}
.err-sub{font-size:13px;color:var(--muted)}
/* hero */
.hero{border-radius:20px;overflow:hidden;margin-bottom:24px;position:relative;min-height:260px;background:var(--surface)}
.hero-img{width:100%;height:260px;object-fit:cover;display:block}
.hero-fb{height:260px;display:flex;align-items:center;justify-content:center;font-size:72px}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.3) 50%,rgba(0,0,0,.1) 100%);display:flex;align-items:flex-end;padding:24px}
.ev-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.ev-meta{font-size:13px;color:rgba(255,255,255,.85);display:flex;flex-direction:column;gap:3px;text-shadow:0 1px 4px rgba(0,0,0,.5)}
/* bg blur */
.bg-blur{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;filter:blur(24px) brightness(.35);transform:scale(1.1)}
/* desc */
.ev-desc{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:var(--muted);line-height:1.7;text-align:center}
/* card */
.card{background:rgba(19,20,26,.9);border:1px solid var(--border);border-radius:20px;padding:26px;backdrop-filter:blur(16px)}
.card-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--primary);text-align:center;margin-bottom:20px}
/* attend toggle */
.tog{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.tog-btn{padding:13px 8px;border-radius:12px;border:2px solid var(--border);background:rgba(255,255,255,.04);cursor:pointer;text-align:center;font-size:13px;font-weight:600;color:var(--muted);font-family:inherit;transition:all .2s}
.tog-btn .em{font-size:18px;display:block;margin-bottom:3px}
.tog-btn.yes{border-color:#34d399;background:rgba(52,211,153,.1);color:#34d399}
.tog-btn.no{border-color:#f87171;background:rgba(248,113,113,.1);color:#f87171}
/* form */
.fg{margin-bottom:18px}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--primary);margin-bottom:7px}
.fi{width:100%;padding:11px 14px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.fi:focus{border-color:var(--primary)}
.fi::placeholder{color:var(--muted)}
textarea.fi{resize:vertical;min-height:72px}
/* counter */
.ctr{display:flex;align-items:center;gap:14px}
.ctr-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;line-height:1}
.ctr-btn:hover{border-color:var(--primary);color:var(--primary)}
.ctr-val{font-size:24px;font-weight:800;color:var(--primary);min-width:32px;text-align:center;font-family:'Playfair Display',serif}
/* submit */
.btn-sub{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#0b0c10;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:6px}
.btn-sub:hover{filter:brightness(1.1)}
.btn-sub:disabled{opacity:.5;cursor:not-allowed}
/* success */
.suc{text-align:center;padding:16px 0}
.suc-em{font-size:60px;margin-bottom:14px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.suc-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--primary);margin-bottom:10px}
.suc-sub{font-size:13px;color:var(--muted);line-height:1.8}
/* footer */
.ft{margin-top:28px;font-size:12px;color:var(--muted);text-align:center}
.ft a{color:var(--primary)}
@media(max-width:420px){.page{padding:20px 12px 40px}.card{padding:18px 14px}}
</style>
</head>
<body>
<div class="bg-blur" id="bg-blur"></div>
<div class="page">

  <!-- LOADING -->
  <div id="screen-loading">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <p style="color:var(--muted);font-size:14px">Đang tải thông tin sự kiện...</p>
  </div>

  <!-- ERROR -->
  <div id="screen-error">
    <div class="err-em">😕</div>
    <div class="err-title">Không tìm thấy sự kiện</div>
    <div class="err-sub">Link mời không hợp lệ hoặc sự kiện đã bị xoá.</div>
  </div>

  <!-- FORM -->
  <div id="screen-form">
    <!-- Hero -->
    <div class="hero" id="hero">
      <div id="hero-fb" class="hero-fb">💍</div>
      <div class="hero-ov">
        <div>
          <div class="ev-name" id="ev-name"></div>
          <div class="ev-meta" id="ev-meta"></div>
        </div>
      </div>
    </div>

    <!-- Description -->
    <div class="ev-desc" id="ev-desc" style="display:none"></div>

    <!-- Card -->
    <div class="card">
      <div class="card-title">Xác nhận tham dự</div>

      <div class="tog">
        <button class="tog-btn yes" id="btn-yes" onclick="setAttend(true)">
          <span class="em">✅</span>Tôi sẽ đến
        </button>
        <button class="tog-btn" id="btn-no" onclick="setAttend(false)">
          <span class="em">❌</span>Tôi không đến
        </button>
      </div>

      <!-- Group selection (bắt buộc) -->
      <div class="fg" id="group-wrap" style="display:none">
        <label class="fl">Bạn thuộc nhóm nào? *</label>
        <div id="group-buttons" style="display:flex;flex-wrap:wrap;gap:8px"></div>
        <input type="hidden" id="g-group-id"/>
        <input type="hidden" id="g-group-name"/>
      </div>

      <div class="fg">
        <label class="fl">Họ tên *</label>
        <input id="g-name" class="fi" type="text" placeholder="Nguyễn Văn A" autocomplete="name"/>
      </div>
      <div class="fg">
        <label class="fl">Số điện thoại</label>
        <input id="g-phone" class="fi" type="tel" placeholder="0901 234 567" autocomplete="tel"/>
      </div>
      <div class="fg" id="extra-wrap">
        <label class="fl">Số người đi cùng</label>
        <div class="ctr">
          <button class="ctr-btn" onclick="chg(-1)">−</button>
          <div class="ctr-val" id="ctr-val">0</div>
          <button class="ctr-btn" onclick="chg(1)">+</button>
          <span style="font-size:13px;color:var(--muted)">người (ngoài bạn)</span>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Ghi chú</label>
        <textarea id="g-note" class="fi" placeholder="Dị ứng thực phẩm, yêu cầu đặc biệt..."></textarea>
      </div>

      <button class="btn-sub" id="btn-sub" onclick="submit()">✅ Xác nhận tham dự</button>
    </div>

    <div class="ft">Hệ thống RSVP bởi <a href="index.html" style="font-family:'Playfair Display',serif;font-weight:700">Event Party</a></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL='https://zvpxvikwhcryeniquexp.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2cHh2aWt3aGNyeWVuaXF1ZXhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTUwMzksImV4cCI6MjA5NzA3MTAzOX0.aG5geshWV650mmipq_7FyxI1mqESuZ1VBsYTQSqTRxI';

const TYPES={
  wedding:{label:'Đám cưới',emoji:'💍',cls:'t-wedding'},
  thoi_noi:{label:'Thôi nôi',emoji:'🍼',cls:'t-thoi_noi'},
  day_thang:{label:'Đầy tháng',emoji:'🌸',cls:'t-day_thang'},
  dam_gio:{label:'Đám giỗ',emoji:'🕯️',cls:'t-dam_gio'},
  birthday:{label:'Sinh nhật',emoji:'🎂',cls:'t-birthday'},
};

let sb, ev, attending=true, extra=0, currentSide=null, currentGroupId=null, currentGroupName=null;

function show(id){
  document.getElementById('screen-loading').style.display='none';
  document.getElementById('screen-error').style.display='none';
  document.getElementById('screen-form').style.display='none';
  document.getElementById(id).style.display= id==='screen-form'?'block':'block';
}

async function init(){
  const params=new URLSearchParams(window.location.search);
  const eventId=params.get('event');
  if(!eventId){show('screen-error');return;}

  try{
    const{createClient}=supabase;
    sb=createClient(SUPA_URL,SUPA_KEY);
    const{data,error}=await sb.from('events').select('*').eq('id',eventId).single();
    if(error||!data){show('screen-error');return;}
    ev=data;
    render(data);
  }catch(e){
    show('screen-error');
  }
}

function render(e){
  const t=TYPES[e.type]||TYPES.wedding;
  document.body.className=t.cls;
  document.title=e.name+' — LễTiệc';

  // hero image
  if(e.image_url){
    const img=document.createElement('img');
    img.src=e.image_url;img.className='hero-img';img.alt='';
    document.getElementById('hero-fb').replaceWith(img);
  } else {
    document.getElementById('hero-fb').textContent=t.emoji;
  }

  // Set blurred background
  if(e.image_url){
    document.getElementById('bg-blur').style.backgroundImage='url('+e.image_url+')';
  }
  document.getElementById('ev-name').textContent=e.name;
  const meta=[];
  if(e.date){
    const d=new Date(e.date+'T00:00:00');
    meta.push('📅 '+d.toLocaleDateString('vi-VN',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'})+(e.time?' · '+e.time:''));
  }
  if(e.location) meta.push('📍 '+e.location);
  document.getElementById('ev-meta').innerHTML=meta.map(m=>`<span>${m}</span>`).join('');

  if(e.description){
    const d=document.getElementById('ev-desc');
    d.textContent=e.description;
    d.style.display='block';
  }

  // Load groups (graceful - không crash nếu bảng chưa có)
  try{
    const{data:groups,error:grpErr}=await sb.from('envelope_groups').select('*').eq('event_id',e.id).order('sort_order');
    if(!grpErr && groups && groups.length){
      const wrap=document.getElementById('group-wrap');
      const btns=document.getElementById('group-buttons');
      wrap.style.display='block';
      btns.innerHTML=groups.map(g=>`
        <button type="button" id="gbtn-${g.id}" onclick="selectGroup('${g.id}','${g.name.replace(/'/g,"\'")}')"
          style="padding:10px 16px;border-radius:10px;border:2px solid var(--border);
            background:rgba(255,255,255,.04);cursor:pointer;font-size:13px;font-weight:600;
            color:var(--muted);font-family:inherit;transition:all .2s"
          data-color="${g.color}">${g.name}</button>`).join('');
    }
  }catch(e){ /* bảng chưa tồn tại - bỏ qua */ }
  show('screen-form');
  setAttend(true);
}

function setAttend(val){
  attending=val;
  document.getElementById('btn-yes').className='tog-btn'+(val?' yes':'');
  document.getElementById('btn-no').className='tog-btn'+(!val?' no':'');
  document.getElementById('extra-wrap').style.display=val?'block':'none';
  updateBtn();
}

function selectGroup(id, name){
  currentGroupId=id;
  currentGroupName=name;
  document.getElementById('g-group-id').value=id;
  document.getElementById('g-group-name').value=name;
  document.querySelectorAll('[id^="gbtn-"]').forEach(btn=>{
    const active=btn.id==='gbtn-'+id;
    const color=btn.dataset.color||'#c9a96e';
    btn.style.borderColor=active?color:'var(--border)';
    btn.style.color=active?color:'var(--muted)';
    btn.style.background=active?color+'22':'rgba(255,255,255,.04)';
  });
}

function setSide(val){
  currentSide=val;
  document.getElementById('btn-groom').className='tog-btn'+(val==='groom'?' yes':'');
  document.getElementById('btn-bride').className='tog-btn'+(val==='bride'?' yes':'');
  // override colors for side
  if(val==='groom'){
    document.getElementById('btn-groom').style.borderColor='#60a5fa';
    document.getElementById('btn-groom').style.color='#60a5fa';
    document.getElementById('btn-groom').style.background='rgba(96,165,250,.1)';
    document.getElementById('btn-bride').style.borderColor='';
    document.getElementById('btn-bride').style.color='';
    document.getElementById('btn-bride').style.background='';
  } else {
    document.getElementById('btn-bride').style.borderColor='#f472b6';
    document.getElementById('btn-bride').style.color='#f472b6';
    document.getElementById('btn-bride').style.background='rgba(244,114,182,.1)';
    document.getElementById('btn-groom').style.borderColor='';
    document.getElementById('btn-groom').style.color='';
    document.getElementById('btn-groom').style.background='';
  }
}

function chg(d){
  extra=Math.max(0,extra+d);
  document.getElementById('ctr-val').textContent=extra;
  updateBtn();
}

function updateBtn(){
  const b=document.getElementById('btn-sub');
  b.textContent=attending?`✅ Xác nhận — ${1+extra} người`:'📩 Gửi phản hồi';
}

async function submit(){
  const name=document.getElementById('g-name').value.trim();
  if(!name){alert('Vui lòng nhập tên của bạn.');return;}
  const btn=document.getElementById('btn-sub');
  btn.disabled=true;btn.textContent='Đang gửi...';

  try{
    // Validate nhóm nếu có
    const groupWrap=document.getElementById('group-wrap');
    if(groupWrap&&groupWrap.style.display!=='none'&&!currentGroupId){
      alert('Vui lòng chọn nhóm của bạn.');
      btn.disabled=false;updateBtn();return;
    }
    const{error}=await sb.from('guests').insert({
      event_id:ev.id,name,
      phone:document.getElementById('g-phone').value.trim()||null,
      extra_count:attending?extra:0,
      attend:attending,
      side:currentGroupId||null,
      group_id:currentGroupId||null,
      group_name:currentGroupName||null,
      note:document.getElementById('g-note').value.trim()||null,
    });
    if(error)throw error;

    document.querySelector('.card').innerHTML=`
      <div class="suc">
        <div class="suc-em">${attending?'🎉':'💌'}</div>
        <div class="suc-title">${attending?'Đã xác nhận!':'Đã ghi nhận'}</div>
        <p class="suc-sub">${attending
          ?`Hẹn gặp <b>${name}</b>${extra>0?' và '+extra+' người':''} tại <b>${ev.location||'buổi tiệc'}</b>! 🥂<br/><br/>Tổng <b>${1+extra} người</b> từ nhóm của bạn.`
          :`Cảm ơn <b>${name}</b> đã thông báo. Hẹn dịp khác! 🙏`}</p>
      </div>`;
  }catch(e){
    btn.disabled=false;
    updateBtn();
    alert('Có lỗi xảy ra: '+(e.message||'Vui lòng thử lại.'));
  }
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
init();
</script>
</body>
</html>
